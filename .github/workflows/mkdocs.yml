name: MKDocs Deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    uses: tryAGI/workflows/.github/workflows/mkdocs-pages.yml@main
    with:
      run-docs-sync: false
      theme-source: ./theme
    secrets: inherit
