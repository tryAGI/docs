site_name: tryAGI Documentation
site_url: https://tryagi.github.io/docs/
site_description: Centralized documentation hub for tryAGI .NET AI SDKs
repo_url: https://github.com/tryAGI/docs
repo_name: tryAGI/docs

nav:
- Home: index.md
- Getting Started: getting-started.md
- MEAI:
  - Overview: meai/index.md
  - IChatClient: meai/chat-client.md
  - IEmbeddingGenerator: meai/embedding-generator.md
  - ISpeechToTextClient: meai/speech-to-text.md
  - CustomProviders: meai/custom-providers.md
  - AIFunction Tools: meai/aifunction-tools.md
  - Namespace Conflicts: meai/namespace-conflict.md
- SDK Catalog: sdks/index.md

theme:
  name: material
  static_templates:
    - 404.html
  language: 'en'
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  include_search_page: false
  search_index_only: true
  favicon: 'media/icon128.png'
  icon:
    logo: 'material/file-document'
  features:
    - content.action.edit
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
  font:
    text: 'Fira Sans'
    code: 'Fira Mono'

extra:
  version:
    provider: mike
  analytics:
    provider: google
    property: G-XXXXXXXXXX
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback!

extra_css:
  - 'css/extra.css?v=14'

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
