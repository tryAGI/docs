site_name: tryAGI Documentation
site_url: https://tryagi.github.io/docs/
site_description: Centralized documentation hub for tryAGI .NET AI SDKs
repo_url: https://github.com/tryAGI/docs
repo_name: tryAGI/docs

nav:
- Home: index.md
- Getting Started: getting-started.md
- Free Tiers:
  - Comparison: generative-media/index.md
  - Free-First LLM Outlet: generative-media/free-first-outlet.md
- MEAI:
  - Overview: meai/index.md
  - IChatClient: meai/chat-client.md
  - IEmbeddingGenerator: meai/embedding-generator.md
  - ISpeechToTextClient: meai/speech-to-text.md
  - CustomProviders: meai/custom-providers.md
  - AIFunction Tools: meai/aifunction-tools.md
  - Namespace Conflicts: meai/namespace-conflict.md
- Realtime Avatars:
  - Overview: realtime-avatars/index.md
- SDK Catalog: sdks/index.md

theme:
  name: tryagi
  favicon: 'media/icon128.png'

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback!

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
